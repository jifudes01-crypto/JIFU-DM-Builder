name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_ADMIN_ACCESS_CODE: JIFU7513
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false

      - name: Typecheck
        run: npm run typecheck

      - name: Build static site
        run: npm run build:pages

      - name: Create Supabase public config
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          url = os.environ.get("NEXT_PUBLIC_SUPABASE_URL", "").strip()
          anon_key = os.environ.get("NEXT_PUBLIC_SUPABASE_ANON_KEY", "").strip()

          if not url or not anon_key:
              print("Supabase 尚未完成部署設定，請在 GitHub Secrets 設定 NEXT_PUBLIC_SUPABASE_URL 與 NEXT_PUBLIC_SUPABASE_ANON_KEY。")
              sys.exit(1)

          with open("out/supabase-config.json", "w", encoding="utf-8") as file:
              json.dump({"url": url, "anonKey": anon_key}, file, ensure_ascii=False)
          PY

      - name: Verify exported assets
        run: |
          test -f out/admin/index.html
          test -d out/_next/static
          grep -q "/JIFU-DM-Builder/_next/static/" out/admin/index.html
          ! grep -q 'href="/_next/static/' out/admin/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
